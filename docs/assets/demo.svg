<svg xmlns="http://www.w3.org/2000/svg" width="920" height="640" viewBox="0 0 920 640" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="14">
  <!-- Terminal transcript of a real run: examples/generate_demo_log.py
       followed by `judgecal audit demo-log.jsonl` (seed=7, condensed).
       Text content is copied verbatim from an actual execution. -->
  <rect width="920" height="640" rx="10" fill="#0d1117"/>
  <rect width="920" height="34" rx="10" fill="#161b22"/>
  <rect y="20" width="920" height="14" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="460" y="22" fill="#8b949e" text-anchor="middle" font-size="12">judgecal — receipts for your LLM judge</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> python examples/generate_demo_log.py demo-log.jsonl</text>
    <text x="24" y="84">wrote 240 records to demo-log.jsonl (seed=7, judge=aurora-8b)</text>
    <text x="24" y="114"><tspan fill="#7ee787">$</tspan> judgecal audit demo-log.jsonl</text>
    <text x="24" y="136">judgecal 0.1.0 — demo-log.jsonl</text>
    <text x="24" y="158">rows: 240  parsed: 240  skipped: 0  judges: aurora-8b</text>
    <text x="24" y="188" fill="#79c0ff">[agreement] Human agreement (n=240 labeled)</text>
    <text x="24" y="210">    Cohen's kappa        0.521  (moderate)</text>
    <text x="24" y="232">    -&gt; <tspan fill="#d29922">WARN</tspan>: kappa 0.521 (moderate): usable, but spot-check disagreements</text>
    <text x="24" y="262" fill="#79c0ff">[position] Position bias (n=224 decisive, 16 ties)</text>
    <text x="24" y="284">    first-position wins  136/224 = 60.7%  [95% CI 54.2%-66.9%]  p=0.0016</text>
    <text x="24" y="306">    swap consistency     60.0%</text>
    <text x="24" y="328">    -&gt; <tspan fill="#f85149">FLAG</tspan>: first-position answers win 60.7% (p=0.0016); randomize or swap-average</text>
    <text x="24" y="358" fill="#79c0ff">[length] Length bias (n=224 compared)</text>
    <text x="24" y="380">    longer answer wins   133/224 = 59.4%  [95% CI 52.8%-65.6%]  p=0.0060</text>
    <text x="24" y="402">    human baseline       judge 58.6% vs human 41.9%  (adjusted delta 0.167, n=210)</text>
    <text x="24" y="424">    -&gt; <tspan fill="#d29922">WARN</tspan>: longer answer wins 59.4% (p=0.006); +16.7 pts over humans</text>
    <text x="24" y="454" fill="#79c0ff">[self] Self-preference (n=99 decisive self-vs-other, 4 ties)</text>
    <text x="24" y="476">    own model wins       71/99 = 71.7%  [95% CI 62.2%-79.7%]  p=1.8e-05</text>
    <text x="24" y="498">    human baseline       judge 71.4% vs human 54.9%  (adjusted delta 0.165, n=91)</text>
    <text x="24" y="520">    -&gt; <tspan fill="#f85149">FLAG</tspan>: judge picks its own model 16.5 pts more often than humans do on the same rows</text>
    <text x="24" y="550">overall: <tspan fill="#f85149">FLAG</tspan></text>
    <text x="24" y="586"><tspan fill="#7ee787">$</tspan> judgecal audit demo-log.jsonl --min-kappa 0.4 --max-position-delta 0.05; echo $?</text>
    <text x="24" y="608"><tspan fill="#f85149">judgecal: FAIL: gate --max-position-delta 0.05: delta is 0.1071</tspan>  ·  exit 1</text>
  </g>
</svg>
